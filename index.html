<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Win Go</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0f172a;padding:15px;color:white;}
.card{background:#1e293b;padding:20px;border-radius:18px;margin-bottom:15px;}
h3{text-align:center;}
.bal{text-align:center;font-size:40px;font-weight:bold;color:#22c55e;margin:10px 0;}
.row{display:flex;gap:12px;margin-top:15px;}
.box{flex:1;background:#334155;padding:15px;border-radius:15px;text-align:center;}
.val{font-size:32px;font-weight:bold;margin-top:5px;}
.timer{color:#f59e0b;}
.big-timer{font-size:60px!important;color:#ef4444;animation:pulse .8s infinite;}
@keyframes pulse{50%{transform:scale(1.15);}}
.inp-wrap{position:relative;margin-top:15px;}
.inp-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#fbbf24;font-weight:bold;font-size:16px;z-index:2;}
.inp-wrap input{padding-left:50px!important;}
input{width:100%;padding:15px;margin-top:10px;border:none;border-radius:12px;font-size:18px;background:#334155;color:white;}
.actions{display:flex;gap:10px;margin-top:15px;}
.btn{flex:1;padding:18px;border:none;border-radius:12px;font-size:22px;font-weight:bold;cursor:pointer;color:white;}
.green{background:#22c55e;}
.blue{background:#3b82f6;}
.red{background:#dc2626;}
.gray{background:#475569;}
.btn:disabled{opacity:.5;}
.result-box{text-align:center;margin-top:15px;padding:15px;background:#0f172a;border-radius:12px;display:none;}
.res-num{font-size:80px;font-weight:bold;}
.win{color:#22c55e;}.lose{color:#ef4444;}
.info-row{display:flex;gap:8px;margin-top:8px;font-size:12px;color:#94a3b8;justify-content:center;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px;}
th{background:#334155;padding:10px 8px;font-weight:normal;color:#94a3b8;font-size:13px;}
td{padding:10px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);}
.bet-big{color:#22c55e;font-weight:bold;}.bet-small{color:#3b82f6;font-weight:bold;}
.amt-win{color:#22c55e;font-weight:bold;}.amt-lose{color:#ef4444;font-weight:bold;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-box{background:#1e293b;padding:24px;border-radius:18px;width:90%;max-width:380px;text-align:center;}
.modal-box h3{margin-bottom:16px;}
.modal-box input{width:100%;padding:14px;border:2px solid #334155;border-radius:12px;font-size:18px;background:#0f172a;color:white;text-align:center;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;}
.modal-btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:white;}
.modal-msg{margin-top:12px;font-size:14px;min-height:20px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.top-bar span{font-size:12px;color:#94a3b8;}
.logout-btn{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
.login-card{max-width:400px;margin:50px auto;text-align:center;}
.login-card h1{color:#22c55e;font-size:28px;margin-bottom:8px;}
.login-card .sub{color:#94a3b8;font-size:13px;margin-bottom:24px;}
.login-card input{width:100%;padding:16px;margin-bottom:14px;border:2px solid #334155;border-radius:14px;font-size:17px;background:#0f172a;color:white;text-align:center;}
.login-card input:focus{outline:none;border-color:#22c55e;}
.login-card button{width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:bold;background:#22c55e;color:white;cursor:pointer;}
.login-card .note{color:#64748b;font-size:12px;margin-top:16px;line-height:1.6;}
.err{color:#ef4444;font-size:14px;margin-top:8px;min-height:20px;}
.hidden{display:none;}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-card">
<h1>WIN GO</h1>
<div class="sub">Masuk & Main</div>
<input id="phone" type="tel" placeholder="Nombor Telefon (0123456789)">
<input id="password" type="password" placeholder="Password (min 4 aksara)">
<button onclick="doLogin()">LOGIN / DAFTAR</button>
<div class="err" id="loginErr"></div>
<div class="note">Pertama kali? Auto daftar!<br>Support: @moinsveit</div>
</div>

<!-- GAME PAGE -->
<div id="gamePage" class="hidden">
<div class="top-bar">
<span>ID: <b id="playerId">---</b></span>
<div>
<button class="logout-btn" onclick="location.href='/admin'">ADMIN</button>
<button class="logout-btn" onclick="logout()">KELUAR</button>
</div>
</div>
<div class="card">
<h3>BALANCE</h3>
<div class="bal" id="balance">RM 0.00</div>
<div style="display:flex;gap:10px;margin-top:10px;">
<button class="btn gray" onclick="openDep()">DEPOSIT</button>
<button class="btn red" onclick="openWd()">WITHDRAW</button>
</div>
<div class="info-row" id="wdInfo"></div>
<div class="row">
<div class="box"><div>PERIOD</div><div class="val" id="period">-----</div></div>
<div class="box"><div>COUNTDOWN</div><div class="val timer" id="timer">30</div></div>
</div>
<div class="result-box" id="resultBox"><div class="res-num" id="resultNum">-</div><div id="resultStatus"></div></div>
<div class="inp-wrap"><span>RM</span><input id="amount" type="number" placeholder="Jumlah" value="10"></div>
<div class="actions">
<button class="btn green" id="btnBig">BIG (5-9)</button>
<button class="btn blue" id="btnSmall">SMALL (0-4)</button>
</div>
</div>
<div class="card"><h3>HISTORY</h3>
<table><thead><tr><th>PERIOD</th><th>BET</th><th>RESULT</th><th>AMOUNT</th></tr></thead>
<tbody id="historyBody"><tr><td colspan="4" style="color:#64748b;text-align:center;padding:20px;">Tiada rekod</td></tr></tbody></table>
</div>
</div>

<!-- DEPOSIT MODAL -->
<div class="modal" id="depModal"><div class="modal-box">
<h3>DEPOSIT</h3><p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">Anda akan dibawa ke Telegram</p>
<p style="font-size:12px;color:#f59e0b;margin-bottom:10px;">Min: RM20</p>
<input id="depAmt" type="number" placeholder="Jumlah" value="50" min="20">
<div class="modal-actions">
<button class="modal-btn gray" onclick="closeDep()">BATAL</button>
<button class="modal-btn green" onclick="doDep()">DEPOSIT</button>
</div><div class="modal-msg" id="depMsg"></div>
</div></div>

<!-- WITHDRAW MODAL -->
<div class="modal" id="wdModal"><div class="modal-box">
<h3>WITHDRAW</h3><p style="font-size:13px;color:#94a3b8;margin-bottom:12px;">Anda akan dibawa ke Telegram</p>
<p style="font-size:12px;color:#f59e0b;margin-bottom:10px;">Min: RM30 | Had: <span id="wdRemain">2</span>/2</p>
<input id="wdAmt" type="number" placeholder="Jumlah" value="50" min="30">
<div class="modal-actions">
<button class="modal-btn gray" onclick="closeWd()">BATAL</button>
<button class="modal-btn red" onclick="doWd()">WITHDRAW</button>
</div><div class="modal-msg" id="wdMsg"></div>
</div></div>

<script>
const T=localStorage.getItem('wingo_token');
const PID=localStorage.getItem('wingo_player_id');
if(T&&PID){document.getElementById('loginPage').classList.add('hidden');document.getElementById('gamePage').classList.remove('hidden');initGame();}

async function doLogin(){
 const ph=document.getElementById('phone').value.trim();
 const pw=document.getElementById('password').value.trim();
 const er=document.getElementById('loginErr');er.textContent='';
 if(!ph||!pw){er.textContent='Sila isi nombor & password.';return;}
 try{
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:ph,password:pw})});
  const d=await r.json();
  if(!r.ok){er.textContent=d.error||'Ralat.';return;}
  localStorage.setItem('wingo_token',d.token);
  localStorage.setItem('wingo_player_id',d.player_id);
  localStorage.setItem('wingo_phone',d.phone);
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('gamePage').classList.remove('hidden');
  initGame();
  alert(d.message||'Berjaya!');
 }catch(e){er.textContent='Tiada sambungan server.';}
}

let bal=0,timer=30,period=Math.floor(Math.random()*90000)+10000,locked=false,betPlaced=false,userBet=null,betAmt=0;
const be=document.getElementById('balance'),pe=document.getElementById('period'),te=document.getElementById('timer');
const ae=document.getElementById('amount'),bB=document.getElementById('btnBig'),bS=document.getElementById('btnSmall');
const rb=document.getElementById('resultBox'),rn=document.getElementById('resultNum'),rs=document.getElementById('resultStatus');
const hb=document.getElementById('historyBody');

async function api(url,body){
 const r=await fetch(url,{method:body?'POST':'GET',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T},body:body?JSON.stringify(body):undefined});
 return r.json();
}

async function initGame(){
 document.getElementById('playerId').textContent=PID;
 const m=await api('/api/auth/me'); if(m.balance!==undefined){bal=m.balance;be.textContent='RM '+bal.toFixed(2);}
 const w=await api('/api/game/withdraw-info');
 document.getElementById('wdInfo').innerHTML='Pengeluaran: <b style="color:#f59e0b">'+w.remaining+'/'+w.max+'</b> hari ini';
 loadHist();
}
async function loadHist(){
 const h=await api('/api/game/history');
 if(!Array.isArray(h)||h.length===0){hb.innerHTML='<tr><td colspan="4" style="color:#64748b;text-align:center;padding:20px;">Tiada rekod</td></tr>';return;}
 hb.innerHTML=h.map(r=>`<tr><td>${r.period}</td><td class="${r.bet_type==='BIG'?'bet-big':'bet-small'}">${r.bet_type}</td><td>${r.result_number} (${r.result_type})</td><td class="${r.won?'amt-win':'amt-lose'}">RM ${r.won?'+'+r.win_amount.toFixed(2):'-'+r.bet_amount.toFixed(2)}</td></tr>`).join('');
}
function bet(type){
 if(locked)return;const a=parseFloat(ae.value);
 if(isNaN(a)||a<1)return alert('Min RM1');if(a>bal)return alert('Baki tak cukup.');
 bal-=a;be.textContent='RM '+bal.toFixed(2);betPlaced=true;betAmt=a;userBet=type;
 rb.style.display='block';rn.textContent='...';rn.className='res-num';rs.textContent='';
}
async function resolve(){
 if(!betPlaced)return;
 const d=await api('/api/game/bet',{period:String(period),betType:userBet,betAmount:betAmt});
 if(d.error)return alert(d.error);
 bal=d.newBalance;be.textContent='RM '+bal.toFixed(2);
 rn.textContent=d.resultNumber;rn.className='res-num '+(d.won?'win':'lose');
 rs.textContent=d.resultType;rs.style.color=d.resultType==='BIG'?'#22c55e':'#3b82f6';
 loadHist();betPlaced=false;userBet=null;betAmt=0;
}
bB.onclick=()=>bet('BIG');bS.onclick=()=>bet('SMALL');

function openDep(){document.getElementById('depAmt').value=50;document.getElementById('depMsg').textContent='';document.getElementById('depModal').classList.add('active');}
function closeDep(){document.getElementById('depModal').classList.remove('active');}
async function doDep(){
 const a=parseFloat(document.getElementById('depAmt').value);
 if(isNaN(a)||a<20)return document.getElementById('depMsg').textContent='Min RM20.';
 const d=await api('/api/game/request-deposit',{amount:a});
 if(d.telegramUrl)window.open(d.telegramUrl,'_blank');closeDep();
}
async function openWd(){
 const d=await api('/api/game/withdraw-info');if(d.remaining===0)return alert('Had harian capai.');
 document.getElementById('wdRemain').textContent=d.remaining;
 document.getElementById('wdAmt').value=50;document.getElementById('wdMsg').textContent='';
 document.getElementById('wdModal').classList.add('active');
}
function closeWd(){document.getElementById('wdModal').classList.remove('active');}
async function doWd(){
 const a=parseFloat(document.getElementById('wdAmt').value);
 if(isNaN(a)||a<30)return document.getElementById('wdMsg').textContent='Min RM30.';
 if(a>bal)return document.getElementById('wdMsg').textContent='Baki tak cukup.';
 const d=await api('/api/game/request-withdraw',{amount:a});
 if(d.error)return document.getElementById('wdMsg').textContent=d.error;
 if(d.telegramUrl)window.open(d.telegramUrl,'_blank');closeWd();initGame();
}
function logout(){localStorage.clear();location.reload();}

setInterval(()=>{
 if(document.getElementById('gamePage').classList.contains('hidden'))return;
 timer--;
 if(timer<=5&&!locked){locked=true;te.classList.add('big-timer');bB.disabled=true;bS.disabled=true;ae.disabled=true;}
 if(timer<0){resolve();timer=30;period=Math.floor(Math.random()*90000)+10000;locked=false;te.classList.remove('big-timer');bB.disabled=false;bS.disabled=false;ae.disabled=false;rb.style.display='none';}
 te.textContent=timer;pe.textContent=period;
},1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Win Go - Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0f172a;padding:15px;color:white;}
.card{background:#1e293b;padding:20px;border-radius:18px;margin-bottom:15px;}
h1{color:#ef4444;margin-bottom:16px;text-align:center;}
input{width:100%;padding:14px;margin-bottom:10px;border:2px solid #334155;border-radius:12px;font-size:16px;background:#0f172a;color:white;}
button{padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;color:white;width:100%;margin-bottom:8px;}
.g{background:#16a34a;}.r{background:#dc2626;}.y{background:#f59e0b;color:#000;}.p{background:#7c3aed;}.gy{background:#475569;}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.stat div{background:#334155;padding:12px;border-radius:10px;text-align:center;}
.stat b{font-size:24px;color:#fbbf24;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
th{background:#334155;padding:8px;color:#94a3b8;font-size:12px;}
td{padding:8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);}
.msg{color:#22c55e;margin-top:8px;font-size:14px;min-height:20px;}
.err{color:#ef4444;}
</style>
</head>
<body>

<div class="card" id="loginBox">
<h1>ADMIN LOGIN</h1>
<input id="adminPw" type="password" placeholder="Password Admin">
<button class="g" onclick="login()">LOGIN</button>
<div class="msg" id="loginMsg"></div>
</div>

<div id="panel" style="display:none;">
<div class="card">
<h1>ADMIN PANEL</h1>
<div class="stat">
<div><b id="tp">0</b><br>Player</div>
<div><b id="tbal">RM 0</b><br>Total Baki</div>
</div>
<input id="pid" placeholder="Player ID (contoh: A1B2C3D4)">
<input id="amt" type="number" placeholder="Jumlah (RM)" value="50">
<button class="g" onclick="topup()">💰 TOPUP BALANCE</button>
<button class="r" onclick="deduct()">🔻 TOLAK BALANCE</button>
<button class="y" onclick="resetWd()">🔄 RESET HAD WITHDRAW</button>
<button class="gy" onclick="logout()">🚪 KELUAR</button>
<div class="msg" id="msg"></div>
</div>

<div class="card">
<h3>SENARAI PLAYER</h3>
<input id="searchInput" placeholder="Cari Player ID atau nombor..." oninput="filterPlayers()">
<table>
<thead><tr><th>PLAYER ID</th><th>PHONE</th><th>BALANCE</th><th>WD</th></tr></thead>
<tbody id="plist"></tbody>
</table>
</div>
</div>

<script>
let token='';
let allPlayers=[];

async function api(url,body){
 const h={'Content-Type':'application/json'};
 if(token) h['Authorization']='Bearer '+token;
 const r=await fetch(url,{method:body?'POST':'GET',headers:h,body:body?JSON.stringify(body):undefined});
 return r.json();
}

async function login(){
 const d=await api('/api/admin/login',{password:document.getElementById('adminPw').value});
 if(d.error) return document.getElementById('loginMsg').textContent=d.error;
 if(d.success){token=d.token;localStorage.setItem('admin_token',token);showPanel();}
}

function showPanel(){
 document.getElementById('loginBox').style.display='none';
 document.getElementById('panel').style.display='block';
 loadData();
}

async function loadData(){
 const s=await api('/api/admin/stats');
 document.getElementById('tp').textContent=s.totalPlayers||0;
 document.getElementById('tbal').textContent='RM '+parseFloat(s.totalBalance||0).toFixed(2);
 const p=await api('/api/admin/players');
 allPlayers=p||[];
 renderPlayerList(allPlayers);
}

function renderPlayerList(players){
 document.getElementById('plist').innerHTML=players.map(u=>`<tr>
  <td style="color:#fbbf24;font-weight:bold;">${u.player_id}</td>
  <td>${u.phone}</td>
  <td>RM ${parseFloat(u.balance).toFixed(2)}</td>
  <td>${u.withdraw_count||0}/2</td>
 </tr>`).join('');
}

function filterPlayers(){
 const q=document.getElementById('searchInput').value.toLowerCase();
 const f=allPlayers.filter(p=>p.player_id.toLowerCase().includes(q)||p.phone.includes(q));
 renderPlayerList(f);
}

async function topup(){
 const pid=document.getElementById('pid').value.trim();
 const amt=parseFloat(document.getElementById('amt').value);
 if(!pid)return alert('Masukkan Player ID.');
 if(isNaN(amt)||amt<=0)return alert('Jumlah tak sah.');
 const d=await api('/api/admin/topup',{player_id:pid,amount:amt});
 document.getElementById('msg').innerHTML=d.message||d.error;
 if(d.success) loadData();
}

async function deduct(){
 const pid=document.getElementById('pid').value.trim();
 const amt=parseFloat(document.getElementById('amt').value);
 if(!pid)return alert('Masukkan Player ID.');
 if(isNaN(amt)||amt<=0)return alert('Jumlah tak sah.');
 const d=await api('/api/admin/deduct',{player_id:pid,amount:amt});
 document.getElementById('msg').innerHTML=d.message||d.error;
 if(d.success) loadData();
}

async function resetWd(){
 const pid=document.getElementById('pid').value.trim();
 if(!pid)return alert('Masukkan Player ID.');
 await api('/api/admin/reset-withdraw',{player_id:pid});
 document.getElementById('msg').textContent='Had withdraw '+pid+' direset!';
 loadData();
}

function logout(){localStorage.clear();token='';location.reload();}
if(localStorage.getItem('admin_token')){token=localStorage.getItem('admin_token');showPanel();}
</script>
</body>
</html>
